<div class="sheet-section">
  <div class="section-header">
    <div>
      <h5 class="mb-0">Grip Library</h5>
      <p class="section-copy mb-0">Reusable grips for this song sheet.</p>
    </div>
    <button class="btn btn-outline-primary btn-sm" type="button" (click)="addGrip()">
      <i class="bi bi-plus"></i> Add Grip
    </button>
  </div>

  @if (sheet().grips.length > 0) {
  <div class="row" cdkDropList (cdkDropListDropped)="dropGrip($event)">
    @for (grip of sheet().grips; track grip.gripId) {
    <div class="col-6 col-lg-4 mb-3" cdkDrag>
      <div class="card h-100">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3 gap-2">
            <div class="drag-handle text-muted" cdkDragHandle title="Drag to reorder">
              <i class="bi bi-grip-vertical"></i>
            </div>
            <button class="btn btn-link p-0 text-decoration-none grip-title" type="button" (click)="addGrip(grip.chordName)">
              {{ grip.chordName }}
            </button>
            <div class="ms-auto d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm" type="button" (click)="playGrip(grip)">
                <i class="bi bi-play-fill"></i>
              </button>
              <button class="btn btn-outline-danger btn-sm" type="button" (click)="removeGrip(grip.gripId)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>

          @if (grip.grip) {
          <div class="d-flex justify-content-center">
            <app-grip-diagram [grip]="grip.grip"></app-grip-diagram>
          </div>
          } @else {
          <div class="alert alert-warning mb-0">Grip data not available.</div>
          }
        </div>
      </div>
    </div>
    }
  </div>
  } @else {
  <div class="alert alert-info mb-0">No grips yet. Add a few chords to use them directly in part measures.</div>
  }
</div>
