<div class="container app-page">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-1"><i class="bi bi-clock me-2"></i>Metronome</h2>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-4">
          <label for="bpm" class="form-label">BPM</label>
          <app-bpm-selector controlId="bpm" [(ngModel)]="bpm" (ngModelChange)="onBpmChange()" />
        </div>

        <div class="col-12 col-md-4">
          <label for="timeSignature" class="form-label">Time Signature</label>
          <select id="timeSignature" class="form-select" [(ngModel)]="timeSignature" (ngModelChange)="onTimeSignatureChange()">
            @for (ts of timeSignatureOptions; track ts) {
              <option [ngValue]="ts">{{ timeSignatureOptionLabel(ts) }}</option>
            }
          </select>
        </div>

        <div class="col-12">
          <div class="d-flex flex-wrap gap-3">
            @if (supportsEighthSubdivision()) {
              <div class="form-check">
                <input
                  id="subdivision8th"
                  class="form-check-input"
                  type="checkbox"
                  [ngModel]="isEighthSubdivisionChecked()"
                  (ngModelChange)="onQuarterEighthSubdivisionChange($event)" />
                <label class="form-check-label" for="subdivision8th">8th</label>
              </div>
            }

            @if (supportsSixteenthSubdivision()) {
              <div class="form-check">
                <input
                  id="subdivision16th"
                  class="form-check-input"
                  type="checkbox"
                  [ngModel]="isSixteenthSubdivisionChecked()"
                  (ngModelChange)="onSixteenthSubdivisionChange($event)" />
                <label class="form-check-label" for="subdivision16th">16th</label>
              </div>
            }
          </div>
        </div>

        <div class="col-12 col-md-4">
          <button
            class="btn"
            type="button"
            [class.btn-danger]="running"
            [class.btn-outline-primary]="!running"
            (click)="toggle()">
            <i class="bi" [class.bi-stop-fill]="running" [class.bi-play-fill]="!running"></i>
            {{ running ? 'Stop' : 'Play' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="metronome-beats" aria-label="Beat visualization">
        @for (label of labels; track trackByIndex($index)) {
          <span
            class="beat"
            [class.active]="$index === activeIndex"
            [style.transform]="'scale(' + scales[$index] + ')'">
            {{ label }}
          </span>
        }
      </div>
    </div>
  </div>
</div>
