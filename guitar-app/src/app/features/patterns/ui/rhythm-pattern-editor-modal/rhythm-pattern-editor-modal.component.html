<div class="modal-content-wrapper">
  <div class="modal-header">
    <h5 class="modal-title">{{ pattern ? 'Edit Rhythm Pattern' : 'Create Rhythm Pattern' }}</h5>
    <button
      class="btn btn-sm ms-2"
      [class.btn-danger]="isPatternPlaybackActive()"
      [class.btn-outline-primary]="!isPatternPlaybackActive()"
      type="button"
      (click)="playPattern()">
      <i class="bi" [class.bi-stop-fill]="isPatternPlaybackActive()" [class.bi-play-fill]="!isPatternPlaybackActive()"></i>
      {{ isPatternPlaybackActive() ? 'Stop Preview' : 'Play Preview' }}
    </button>
    <button type="button" class="btn-close" (click)="onCancel()"></button>
  </div>
  <div class="modal-body">
    @if (pattern) {
      <app-rhythm-pattern-editor #editor
        [pattern]="pattern">
      </app-rhythm-pattern-editor>
    }
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" type="button" (click)="onCancel()">
      <i class="bi bi-x"></i> Cancel
    </button>
    <button class="btn btn-primary" type="button" (click)="onSave()">
      <i class="bi bi-check"></i> Save Pattern
    </button>
  </div>
</div>
