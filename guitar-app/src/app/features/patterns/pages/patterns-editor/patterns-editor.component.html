<div class="container app-page">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">
      <i class="bi bi-music-note-beamed me-2"></i>
      {{ editorMode === 'clone' ? 'Clone Pattern' : editorMode === 'edit' ? 'Edit Pattern' : 'Create Pattern' }}
    </h2>
    <div class="d-flex gap-2">
      <button class="btn btn-secondary" type="button" (click)="cancel()">
        <i class="bi bi-x"></i> Cancel
      </button>
      <button class="btn btn-primary" type="button" [disabled]="!pattern" (click)="save()">
        <i class="bi bi-check"></i> {{ editorMode === 'clone' ? 'Save Copy' : 'Save' }}
      </button>
    </div>
  </div>

  @if (pattern) {
    <div class="row g-3 mb-3">
      <div class="col-12 col-md-4">
        <label class="form-label" for="patternEditorName">Name</label>
        <input id="patternEditorName" name="patternEditorName" type="text" autocomplete="off" class="form-control" [(ngModel)]="pattern.name" />
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label" for="patternEditorCategory">Category</label>
        <input id="patternEditorCategory" name="patternEditorCategory" type="text" autocomplete="off" class="form-control" [(ngModel)]="pattern.category" />
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label" for="patternEditorDescription">Description</label>
        <input id="patternEditorDescription" name="patternEditorDescription" type="text" autocomplete="off" class="form-control" [(ngModel)]="pattern.description" />
      </div>
    </div>

    <app-playing-pattern-editor [pattern]="pattern"></app-playing-pattern-editor>
  }
</div>
