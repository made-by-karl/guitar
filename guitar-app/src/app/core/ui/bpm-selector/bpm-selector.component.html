<div class="input-group">
  <select
    class="form-select bpm-mode"
    [attr.name]="(controlId() ?? 'bpm') + '-mode'"
    [ngModel]="mode"
    (ngModelChange)="onModeChange($event)"
    [disabled]="disabled"
    aria-label="BPM selection mode">
    <option value="tempo">Tempo</option>
    <option value="custom">Custom</option>
  </select>

  @if (mode === 'tempo') {
    <select
      [id]="controlId()"
      class="form-select"
      [attr.name]="(controlId() ?? 'bpm') + '-value'"
      [ngModel]="selectedPresetId"
      (ngModelChange)="onPresetChange($event)"
      [disabled]="disabled"
      aria-label="BPM tempo preset">
      @for (preset of presets; track preset.id) {
        <option [value]="preset.id">{{ preset.label }}</option>
      }
    </select>
  } @else {
    <input
      [id]="controlId()"
      class="form-control"
      [attr.name]="(controlId() ?? 'bpm') + '-value'"
      [ngModel]="customText"
      (ngModelChange)="onCustomInput($event)"
      (blur)="onCustomBlur()"
      [disabled]="disabled"
      inputmode="numeric"
      pattern="\d*"
      aria-label="Custom BPM" />
  }

  <span class="input-group-text">BPM</span>
</div>
